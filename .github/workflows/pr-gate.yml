name: PR Gate (smoke + contract + reg_ci)

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke tests
        run: |
          pytest -q --tb=short tests/smoke --maxfail=1

      - name: Contract tests
        run: |
          pytest -q --tb=short tests/contract --maxfail=1

      - name: CI Regression tests (PR Gate)
        run: |
          pytest -q --tb=short tests/reg_ci --maxfail=1 \
            --json-report --json-report-file=report.json

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ github.run_id }}
          path: report.json
          retention-days: 7
