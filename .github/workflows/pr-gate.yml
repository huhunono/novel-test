name: PR Gate (smoke + contract + reg_ci)

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BASE_URL: http://127.0.0.1:8083
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      DB_HOST: 127.0.0.1
      DB_PORT: "3307"
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: novel_plus
      NOVEL_API_IMAGE: ${{ secrets.NOVEL_API_IMAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start backend services
        run: docker compose up -d --wait

      - name: Wait for API readiness
        run: |
          echo "Waiting for backend at $BASE_URL ..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8083/book/listBookCategory > /dev/null; then
              echo "Backend is ready after ${i} attempts."
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, sleeping 3s"
            sleep 3
          done
          echo "ERROR: backend did not become ready in 90s"
          docker compose logs novel-api
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke tests
        run: pytest -q --tb=short tests/smoke --maxfail=1

      - name: Contract tests
        run: pytest -q --tb=short tests/contract --maxfail=1

      - name: CI Regression tests (PR Gate)
        run: |
          pytest -q --tb=short tests/reg_ci --maxfail=1 \
            --json-report --json-report-file=report.json

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ github.run_id }}
          path: report.json
          retention-days: 7

      - name: Teardown services
        if: always()
        run: docker compose down -v
