name: Nightly Full Regression

on:
  schedule:
    - cron: '0 18 * * *'  # 02:00 CST (UTC+8) = 18:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # required for peaceiris/actions-gh-pages to push gh-pages branch

    env:
      BASE_URL: http://localhost:8083
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      DB_HOST: 127.0.0.1
      DB_PORT: "3307"
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: novel_plus

    steps:
      # ── 1. Checkout automation repo ─────────────────────────────────────────
      - name: Checkout automation repo
        uses: actions/checkout@v4

      # ── 2. Checkout backend repo into ./backend ──────────────────────────────
      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.BACKEND_REPO }}
          token: ${{ secrets.BACKEND_REPO_TOKEN }}
          path: backend

      # ── 3. Set up JDK 17 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # ── 4. Build backend JAR ─────────────────────────────────────────────────
      - name: Build backend
        working-directory: backend
        run: mvn -pl novel-front -am clean package -DskipTests

      # ── 4.1 Build backend Docker image ───────────────────────────────────────
      - name: Build backend Docker image
        run: docker build -t novel-api:latest ./backend/novel-front/target/build

      # ── 5. Start backend services (uses repo-root docker-compose.local.yml) ─
      - name: Start backend services
        env:
          NOVEL_API_IMAGE: novel-api:latest
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
        run: docker compose -f docker-compose.local.yml up -d

      # ── 5.1 Debug backend startup logs ───────────────────────────────────────
      - name: Debug backend logs
        if: always()
        env:
          NOVEL_API_IMAGE: novel-api:latest
        run: |
          docker compose -f docker-compose.local.yml ps
          docker compose -f docker-compose.local.yml logs app --tail=200
          docker compose -f docker-compose.local.yml logs mysql --tail=100
          docker compose -f docker-compose.local.yml logs redis --tail=50

      # ── 6. Wait for backend API readiness ───────────────────────────────────
      - name: Wait for API readiness
        env:
          NOVEL_API_IMAGE: novel-api:latest
        run: |
          echo "Waiting for backend at $BASE_URL ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8083/book/listClickRank > /dev/null 2>&1; then
              echo "Backend is ready after ${i} attempts."
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, sleeping 10s"
            sleep 10
          done
          echo "ERROR: backend did not become ready in 300s"
          docker compose -f docker-compose.local.yml logs
          exit 1

      # ── 7. Set up Python 3.11 ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 8. Install test dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 8.1 Install Playwright browsers (for UI tests) ──────────────────────
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      # ── 9a. Smoke tests ──────────────────────────────────────────────────────
      # No --maxfail: nightly collects full results across all suites
      - name: Smoke tests
        run: pytest -q --tb=short tests/smoke --alluredir=allure-results
        continue-on-error: true

      # ── 9b. Contract tests ───────────────────────────────────────────────────
      - name: Contract tests
        run: pytest -q --tb=short tests/contract --alluredir=allure-results
        continue-on-error: true

      # ── 9c. CI Regression tests ──────────────────────────────────────────────
      - name: CI Regression tests
        run: pytest -q --tb=short tests/reg_ci --alluredir=allure-results
        continue-on-error: true

      # ── 9d. Full Regression tests (nightly only) ─────────────────────────────
      - name: Full Regression tests
        run: pytest -q --tb=short tests/regression --alluredir=allure-results --json-report --json-report-file=report.json
        continue-on-error: true

      # ── 9e. UI smoke tests (Playwright, headless) ────────────────────────────
      - name: UI smoke tests
        env:
          HEADLESS: "true"
        run: pytest -q --tb=short -m ui tests/ui --alluredir=allure-results
        continue-on-error: true

      # ── 10. Show logs on failure ─────────────────────────────────────────────
      - name: Show backend logs on failure
        if: failure()
        env:
          NOVEL_API_IMAGE: novel-api:latest
        run: docker compose -f docker-compose.local.yml logs

      # ── 11a. Upload Allure results ────────────────────────────────────────────
      - name: Upload Allure results
        if: always() && hashFiles('allure-results/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 14

      # ── 11b. Upload JSON report ───────────────────────────────────────────────
      - name: Upload JSON report
        if: always() && hashFiles('report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report-${{ github.run_id }}
          path: report.json
          retention-days: 14

      # ── 11c. Install Allure CLI ───────────────────────────────────────────────
      - name: Install Allure CLI
        if: always() && hashFiles('allure-results/**') != ''
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ── 11d. Generate Allure HTML report ──────────────────────────────────────
      - name: Generate Allure report
        if: always() && hashFiles('allure-results/**') != ''
        run: |
          allure generate allure-results -o allure-report --clean
          echo "Report generated at $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > allure-report/timestamp.txt

      # ── 11e. Deploy Allure report to GitHub Pages ─────────────────────────────
      # Deploys to two paths:
      #   /nightly/<run_number>/  — permanent link for this run
      #   /nightly/latest/        — stable URL always pointing to newest report
      - name: Deploy to GitHub Pages (versioned)
        if: always() && hashFiles('allure-report/**') != ''
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: nightly/${{ github.run_number }}

      - name: Deploy to GitHub Pages (latest)
        if: always() && hashFiles('allure-report/**') != ''
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: nightly/latest

      # ── 12. Teardown services ─────────────────────────────────────────────────
      - name: Teardown services
        if: always()
        env:
          NOVEL_API_IMAGE: novel-api:latest
        run: docker compose -f docker-compose.local.yml down -v
