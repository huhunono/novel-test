# docker-compose.yml — local dev stack
#
# In CI, docker compose runs from the backend/ checkout directory instead.
# This file is used for local development only.
#
# Usage:
#   docker compose up -d --wait   # start all services and wait until healthy
#   docker compose down -v         # teardown

version: "3.9"

services:
  novel-api:
    # For local dev: set NOVEL_API_IMAGE to a pre-built image, or replace with
    # a build: context pointing to your local backend source.
    # Example: image: novel-api:latest  (after running: docker build -t novel-api:latest ../novel-backend)
    image: ${NOVEL_API_IMAGE:?NOVEL_API_IMAGE must be set. Build with: docker build -t novel-api:latest <backend-path>}
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/novel_plus?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-root}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-test123456}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/book/listBookCategory"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-test123456}
      MYSQL_DATABASE: novel_plus
    ports:
      - "3307:3306"
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-test123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
